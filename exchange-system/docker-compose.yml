services:
  postgres:
    image: postgres:16-alpine
    container_name: exchange_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: exchange_user
      POSTGRES_PASSWORD: exchange_pass
      POSTGRES_DB: exchange_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange_user -d exchange_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: exchange_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: exchange_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://exchange_user:exchange_pass@postgres:5432/exchange_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    volumes:
      - backups_data:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: exchange_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Runtime env var: Next.js server uses this to forward /api/v1/* requests
      # to the API container. NOT baked into the browser bundle.
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
    ports:
      - "3000:3000"

  # ── Nginx: single entry point on port 80 ──────────────────────────────────
  # Routes /api/v1/* directly to the NestJS API.
  # Routes everything else to the Next.js frontend.
  # Enables clean deployment behind any cloud load balancer (AWS ALB, GCP NEG, etc.)
  nginx:
    image: nginx:1.27-alpine
    container_name: exchange_nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  backups_data:
